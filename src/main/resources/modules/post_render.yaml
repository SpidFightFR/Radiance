name: "render_pipeline.module.post_render.name"
inputImageConfigs:
  - name: "ldr_input"
    format: "R8G8B8A8_UNORM"
  - name: "first_hit_depth"
    format: "R16_SFLOAT"
  - name: "hdr_input"
    format: "R16G16B16A16_SFLOAT"
  - name: "motion_vector"
    format: "R16G16_SFLOAT"
  - name: "normal_roughness"
    format: "R16G16B16A16_SFLOAT"
outputImageConfigs:
  - name: "post_rendered"
    format: "R8G8B8A8_UNORM"
attributeConfigs:
  - name: "render_pipeline.module.post_render.attribute.star_count"
    type: "int_range:1-20000"
    value: "3000"
  - name: "render_pipeline.module.post_render.attribute.star_min_size"
    type: "float_range:0.01-4.0"
    value: "0.5"
  - name: "render_pipeline.module.post_render.attribute.star_max_size"
    type: "float_range:0.01-4.0"
    value: "0.7"
  - name: "render_pipeline.module.post_render.attribute.star_radius"
    type: "float_range:1.0-4000.0"
    value: "400.0"
